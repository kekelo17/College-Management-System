{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="{% block theme %}light{% endblock %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}College ERP{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://kit.fontawesome.com/7a7b1f0f3c.js" crossorigin="anonymous"></script>

    {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen bg-base-200 text-base-content leading-normal tracking-normal">
{% block body_content %}
    <div class="container mx-auto">
        <section class="flex items-center justify-center h-screen">
            {% block content %}
                <h1 class="text-5xl">Django + Tailwind</h1>
            {% endblock %}
        </section>
    </div>
{% endblock %}

{% block extra_js %}{% endblock %}
</body>
</html>
